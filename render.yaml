services:
  - type: web
    name: unisync-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
        placeholder: "Enter your Supabase Project URL"
      - key: SUPABASE_ANON_KEY
        sync: false
        placeholder: "Enter your Supabase anon/public key"
